<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Artigo | Amanda Reis Advocacia</title>
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg"/>
  <link rel="icon" type="image/x-icon" href="../images/favicon.ico"/>
  <link rel="stylesheet" href="../style.css"/>
  <style>
    .artigo-hero{background:var(--dark);padding:9rem 8% 5rem;position:relative;overflow:hidden}
    .artigo-hero-glow{position:absolute;top:-60px;right:-60px;width:350px;height:350px;background:rgba(92,75,87,.2);border-radius:50%;filter:blur(80px);pointer-events:none}
    .artigo-hero .back-link{display:inline-flex;align-items:center;gap:.5rem;color:var(--bege);text-decoration:none;font-size:.75rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2rem;opacity:.7;transition:opacity .3s;cursor:none}
    .artigo-hero .back-link:hover{opacity:1}
    .artigo-cat{font-size:.67rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--bege);opacity:.7;margin-bottom:.8rem;display:flex;align-items:center;gap:.6rem}
    .artigo-cat::before{content:'';display:block;width:20px;height:2px;background:var(--bege);border-radius:1px}
    .artigo-hero h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,3.2rem);font-weight:900;color:var(--light);line-height:1.15;max-width:760px;position:relative}
    .artigo-meta{margin-top:1.2rem;font-size:.78rem;color:var(--bege);opacity:.6;position:relative}
    .artigo-capa{width:100%;max-height:480px;object-fit:cover;display:block}
    .artigo-body{background:var(--light);color:var(--dark);padding:4rem 8%}
    .artigo-grid{display:grid;grid-template-columns:1fr 300px;gap:5rem;align-items:start;max-width:1100px}
    .artigo-content h3{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;color:var(--dark);margin:2rem 0 .9rem}
    .artigo-content p{font-size:.95rem;color:var(--muted);line-height:1.9;margin-bottom:1.1rem;font-weight:300}
    .artigo-content ul{list-style:none;margin:0 0 1.5rem;padding:0;display:flex;flex-direction:column;gap:.6rem}
    .artigo-content ul li{display:flex;align-items:baseline;gap:.7rem;font-size:.92rem;color:var(--muted);line-height:1.65}
    .artigo-content ul li::before{content:'→';color:var(--dark);font-weight:700;flex-shrink:0}
    .artigo-content ul li strong{color:var(--dark);font-weight:600}
    .artigo-sidebar{position:sticky;top:7rem}
    .sidebar-cta{background:var(--dark);color:var(--light);border-radius:var(--r-lg);padding:2rem;margin-bottom:2rem}
    .sidebar-cta h4{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--bege);margin-bottom:.8rem}
    .sidebar-cta p{font-size:.82rem;color:rgba(224,204,199,.75);line-height:1.65;margin-bottom:1.3rem;font-weight:300}
    .sidebar-btn{display:flex;align-items:center;justify-content:center;gap:.5rem;background:#25D366;color:#fff;padding:.85rem 1.2rem;border-radius:50px;font-size:.78rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;text-decoration:none;cursor:none;transition:opacity .3s,transform .3s}
    .sidebar-btn:hover{opacity:.9;transform:translateY(-2px)}
    .sidebar-btn svg{width:16px;height:16px;fill:#fff}
    .outros-artigos h4{font-size:.68rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem}
    .outros-lista{display:flex;flex-direction:column;gap:.7rem}
    .outro-card{display:block;text-decoration:none;color:var(--dark);cursor:none;padding:.9rem 1rem;background:rgba(45,6,27,.04);border:1px solid rgba(45,6,27,.08);border-radius:var(--r);transition:background .3s,border-color .3s}
    .outro-card:hover{background:rgba(45,6,27,.08);border-color:rgba(92,75,87,.25)}
    .outro-card-tag{font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);opacity:.7;margin-bottom:.3rem}
    .outro-card h5{font-size:.83rem;font-weight:600;color:var(--dark);line-height:1.35}
    .artigo-404{text-align:center;padding:5rem 8%;background:var(--light)}
    .artigo-404 h2{font-family:'Playfair Display',serif;font-size:2rem;color:var(--dark);margin-bottom:1rem}
    .artigo-404 a{color:var(--muted);font-size:.9rem}
    @media(max-width:900px){.artigo-hero{padding:8rem 6% 4rem}.artigo-body{padding:3rem 6%}.artigo-grid{grid-template-columns:1fr;gap:3rem}.artigo-sidebar{position:static}nav{padding:.9rem 5%}.nav-links{display:none}}
  </style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<nav id="navbar" class="nav-dark">
  <div class="nav-logo"><img src="../images/logo.png" alt="Amanda Reis Advocacia"/></div>
  <ul class="nav-links">
    <li><a href="../index.html#sobre">Sobre</a></li>
    <li><a href="../index.html#atuacao">Atuação</a></li>
    <li><a href="../index.html#diferenciais">Diferenciais</a></li>
    <li><a href="../index.html#contato" class="nav-cta">Fale Conosco</a></li>
  </ul>
</nav>
<div id="artigo-root"><div style="text-align:center;padding:8rem 2rem;color:#999;font-family:'Poppins',sans-serif">Carregando artigo…</div></div>
<footer>
  <div class="footer-inner">
    <div class="footer-logo"><img src="../images/logo.png" alt="Amanda Reis Advocacia"/></div>
    <p class="footer-copy">© 2025 Amanda Reis Advocacia. Todos os direitos reservados.</p>
    <div class="footer-links">
      <a href="https://www.instagram.com/advamandareis/">Instagram</a>
      <a href="https://wa.me/5561999284025">WhatsApp</a>
    </div>
  </div>
</footer>
<script>
  const FIREBASE_CONFIG = {
    apiKey:"COLE_SEU_apiKey_AQUI",authDomain:"COLE_SEU_authDomain_AQUI",
    projectId:"COLE_SEU_projectId_AQUI",storageBucket:"COLE_SEU_storageBucket_AQUI",
    messagingSenderId:"COLE_SEU_messagingSenderId_AQUI",appId:"COLE_SEU_appId_AQUI"
  };

  const cur=document.getElementById('cursor'),curR=document.getElementById('cursorRing');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
  (function anim(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;curR.style.left=rx+'px';curR.style.top=ry+'px';requestAnimationFrame(anim);})();
  const nav=document.getElementById('navbar');
  window.addEventListener('scroll',()=>nav.classList.toggle('scrolled',window.scrollY>60));

  function estaPublicado(a){
    if(!a.publicadoEm) return true;
    const hoje=new Date(); hoje.setHours(0,0,0,0);
    return new Date(a.publicadoEm+'T00:00:00')<=hoje;
  }

  function render(artigo, outros) {
    document.title=`${artigo.titulo} | Amanda Reis Advocacia`;
    const root=document.getElementById('artigo-root');
    root.innerHTML=`
      <section class="artigo-hero">
        <div class="artigo-hero-glow"></div>
        <a href="index.html" class="back-link">← Todos os artigos</a>
        <div class="artigo-cat">${artigo.categoria||'Artigo'}</div>
        <h1>${artigo.titulo}</h1>
        <div class="artigo-meta">Publicado em ${artigo.data} · Amanda Reis Advocacia</div>
      </section>
      ${artigo.foto?`<img class="artigo-capa" src="${artigo.foto}" alt="${artigo.titulo}" loading="eager"/>`:''}
      <section class="artigo-body">
        <div class="artigo-grid">
          <div class="artigo-content">${artigo.conteudo}</div>
          <aside class="artigo-sidebar">
            <div class="sidebar-cta">
              <h4>Precisa de ajuda jurídica?</h4>
              <p>A Dra. Amanda Reis pode orientar seu caso com estratégia e dedicação. Atendimento presencial no DF e Goiás, online para todo o Brasil.</p>
              <a href="https://wa.me/5561999284025" class="sidebar-btn">
                <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                Falar no WhatsApp
              </a>
            </div>
            ${outros.length?`<div class="outros-artigos"><h4>Outros Artigos</h4><div class="outros-lista">${outros.map(o=>`<a href="artigo.html?id=${o._docid}" class="outro-card"><div class="outro-card-tag">${o.categoria||'Artigo'}</div><h5>${o.titulo}</h5></a>`).join('')}</div></div>`:''}
          </aside>
        </div>
      </section>`;
    document.querySelectorAll('a,button').forEach(el=>{
      el.addEventListener('mouseenter',()=>{cur.style.transform='translate(-50%,-50%) scale(2.8)';cur.style.background='rgba(224,204,199,.35)';});
      el.addEventListener('mouseleave',()=>{cur.style.transform='translate(-50%,-50%) scale(1)';cur.style.background='var(--bege)';});
    });
  }

  window.addEventListener('load',()=>{
    const docid=new URLSearchParams(window.location.search).get('id');
    if(!docid){ notFound(); return; }
    import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js').then(({initializeApp})=>{
      import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js').then(async({getFirestore,doc,getDoc,collection,getDocs,orderBy,query})=>{
        const app=initializeApp(FIREBASE_CONFIG);
        const db=getFirestore(app);
        try{
          const snap=await getDoc(doc(db,'artigos',docid));
          if(!snap.exists()||!estaPublicado({publicadoEm:snap.data().publicadoEm})){ notFound(); return; }
          const artigo={_docid:snap.id,...snap.data()};
          // Carrega outros artigos publicados para sidebar
          const q=query(collection(db,'artigos'),orderBy('publicadoEm','desc'));
          const all=await getDocs(q);
          const outros=all.docs
            .map(d=>({_docid:d.id,...d.data()}))
            .filter(a=>a._docid!==docid&&estaPublicado(a))
            .slice(0,3);
          render(artigo, outros);
        } catch(e){ notFound(); }
      });
    });
  });

  function notFound(){
    document.getElementById('artigo-root').innerHTML=`
      <div class="artigo-404">
        <h2>Artigo não encontrado</h2>
        <a href="index.html">← Ver todos os artigos</a>
      </div>`;
  }
</script>
</body>
</html>
